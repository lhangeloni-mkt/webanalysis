<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg-light { fill: white; }
    .circle-stroke { stroke: #1e293b; }
    .w-text { fill: #ef4444; }
    @media (prefers-color-scheme: dark) {
      .bg-light { fill: #0f172a; }
      .circle-stroke { stroke: #f8fafc; }
    }
  </style>
  <rect width="40" height="40" rx="10" class="bg-light"/>
  <circle cx="20" cy="20" r="12" fill="none" stroke-width="2.5" class="circle-stroke"/>
  <text x="20" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" class="w-text">W</text>
</svg>
